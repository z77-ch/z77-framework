name: Packages Split

# Splits each source directory into its own read-only repo z77-ch/<name>.
# - Push to main  -> split branch history.
# - Push a tag    -> split and propagate the tag (consumable via Composer as x.y.z).
# Requires repository secret ACCESS_TOKEN: a PAT with push rights to the target repos.
# Targets: the 4 code packages under packages/ plus docs/ (published as z77/docs).

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  packages_split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: kernel
            directory: packages/kernel
          - package: module-frontend
            directory: packages/module-frontend
          - package: module-backend
            directory: packages/module-backend
          - package: module-dms
            directory: packages/module-dms
          - package: docs
            directory: docs

    steps:
      # The split action snapshot-copies the current package dir (no splitsh-lite),
      # so a shallow checkout of HEAD is sufficient; HEAD is needed for the commit message.
      - uses: actions/checkout@v4

      # Branch split (only on branch pushes, not on tags)
      - if: "!startsWith(github.ref, 'refs/tags/')"
        uses: symplify/monorepo-split-github-action@v2.4.5
        with:
          package_directory: '${{ matrix.directory }}'
          repository_organization: 'z77-ch'
          repository_name: '${{ matrix.package }}'
          user_name: 'z77-ch'
          user_email: 'peter.ruepp@z77.ch'
          branch: 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      # Tag split (only on tag pushes)
      - if: "startsWith(github.ref, 'refs/tags/')"
        uses: symplify/monorepo-split-github-action@v2.4.5
        with:
          tag: ${{ github.ref_name }}
          package_directory: '${{ matrix.directory }}'
          repository_organization: 'z77-ch'
          repository_name: '${{ matrix.package }}'
          user_name: 'z77-ch'
          user_email: 'peter.ruepp@z77.ch'
          branch: 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
